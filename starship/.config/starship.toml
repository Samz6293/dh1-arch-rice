[directory]
style = "fg:#c9d1d9 bg:#30363d"
format = "[ $path ]($style)"
truncation_length = 0
fish_style_pwd_dir_length = 0
truncate_to_repo = false

[git_branch]
symbol = "´Éÿ "
style = "fg:#c9d1d9 bg:#444c56"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "fg:#c9d1d9 bg:#444c56"
format = "[($all_status$ahead_behind )]($style)"

[time]
disabled = true

[character]
