# ────────────────────────────────────────────────────────────
# Monochromatic Theme & Core Settings 
# ────────────────────────────────────────────────────────────

# --- Core Colors ---
foreground                      #d1cfcf
background                      #000000
selection_foreground            #000000
selection_background            #d1cfcf

# --- Cursor & Links ---
cursor                          #ffffff
cursor_text_color               #000000
url_color                       #d4d4d4

# --- Window Borders ---
active_border_color             #000000
inactive_border_color           #000000
bell_border_color               #ffffff
visual_bell_color               none

# --- The 16 ANSI Colors (Overwritten to Greyscale) ---
# black
color0 #262626
color8 #262626
# red (remapped to grey)
color1 #646464
color9 #646464
# green (remapped to grey)
color2  #8e8e8e
color10 #8e8e8e
# yellow (remapped to grey)
color3  #b9b9b9
color11 #b9b9b9
# blue (remapped to grey)
color4  #989898
color12 #989898
# magenta (remapped to grey)
color5  #747474
color13 #747474
# cyan (remapped to grey)
color6  #585858
color14 #585858
# white
color7  #d4d4d4
color15 #d4d4d4

# --- Fonts ---
font_family      JetBrainsMono Nerd Font
bold_italic_font auto
font_size        9.0

# --- Window Settings ---
window_padding_width 14
hide_window_decorations yes
confirm_os_window_close 0
background_opacity 0.7

# --- Aesthetics & Bells ---
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
enable_audio_bell no

# --- Keybindings ---
map super+c copy_to_clipboard
map super+v paste_from_clipboard

# --- Tab Bar Styling ---
active_tab_foreground           #ffffff
active_tab_background           #fab387
inactive_tab_foreground         #b9b9b9
inactive_tab_background         #222222
tab_bar_background              #000000
tab_bar_margin_color            none
tab_bar_edge                    bottom
tab_bar_style                   powerline
tab_powerline_style             slanted
tab_title_template              {title}{' :{}:'.format(num_windows) if num_windows > 1 else ''}

# --- Misc ---
allow_remote_control yes
wayland_titlebar_color system
macos_titlebar_color system
