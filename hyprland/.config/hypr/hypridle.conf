general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid starting multiple hyprlock inst 
    before_sleep_cmd = loginctl lock-session    # lock before suspend. 
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key twice 
}

listener {
    timeout = 300                               # 5min [cite: 65, 66]
    on-timeout = loginctl lock-session          # lock screen when timeout has passed [cite: 67, 69]
}