#------------------------------------------------------------------------------
# --- LookNFeel & Layouts ---
#------------------------------------------------------------------------------
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

dwindle {
    preserve_split = true
}

decoration {
    rounding = 10
    rounding_power = 1
    dim_inactive = true
    dim_strength = 0.30

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = true

    # 1. A premium, ultra-smooth curve that starts fast and finishes gracefully
    bezier = fluentCurve, 0.16, 1, 0.3, 1

    # 2. Reconfigured transitions with a natural feel
    animation = windows, 1, 5, fluentCurve, popin 85%
    animation = windowsOut, 1, 5, fluentCurve, popin 85%
    
    # Smooth, clean fade transitions for opening/closing and switching windows
    animation = fadeIn, 1, 4, fluentCurve
    animation = fadeOut, 1, 4, fluentCurve
    animation = fadeSwitch, 1, 5, fluentCurve

    # Slower, elegant workspace sliding speed
    animation = workspaces, 1, 6, fluentCurve, slide
}