# =============================================================================
# HYPRLOCK CONFIGURATION (Custom Slate-Ink & Chestnut Theme)
# =============================================================================

# --- COLOR PALETTE VARIABLES ---
$ink_black     = rgb(080E13)
$ink_black_2   = rgb(13191D)
$chestnut      = rgb(7D3E2B)
$olive_wood    = rgb(826F58)
$white         = rgb(FFFFFE)
$jet_black     = rgb(2F3B3F)
$dust_grey     = rgb(D4D7D4)
$grey          = rgb(717B7C)
$charcoal      = rgb(554F4D)
$jet_black_2   = rgb(31393B)

# --- GENERAL SETTINGS ---
general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# --- BACKGROUND WALLPAPER ---
background {
    monitor =
    path = $HOME/Pictures/wallpapers/1.jpg  
    color = $ink_black

    blur_size = 5
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# --- 1. CLOCK WIDGET ---
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%I:%M:%S %p") </big></b>"
    color = $white
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# --- 2. USER IDENTIFIER WIDGET ---
label {
    monitor =
    text = Hi there, <span size="larger">$USER</span>
    color = $dust_grey
    font_size = 20
    font_family = JetBrains Mono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

# --- 3. PASSWORD INPUT BOX ---
input-field {
    monitor =
    size = 280, 45          # Increased width from 250 to 280 to prevent text clipping
    outline_thickness = 3
    dots_size = 0.2 
    dots_spacing = 1.00 
    dots_center = true
    outer_color = $charcoal
    inner_color = $ink_black_2
    font_color = $white
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -60
    halign = center
    valign = center

    # --- FAIL MESSAGES & VISUAL ADJUSTMENTS ---
    fail_color = $chestnut               # Border changes to chestnut on failure
    fail_text = <i>Wrong password ($attempts)</i> # Clean, concise message that fits perfectly
    fail_transition = 200                # Smooth fading transition speed in ms
}

# --- 4. UNLOCK INSTRUCTION FOOTER ---
label {
    monitor =
    text = Type to unlock!
    color = $dust_grey
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 0, -110
    halign = center
    valign = center
}
