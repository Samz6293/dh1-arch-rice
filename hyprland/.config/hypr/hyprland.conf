# -- Launchers --
$menu = wofi --show drun

# -- Exec Once --
exec-once = hyprpaper 
exec-once = waybar & swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = hyprsunset
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = keyd-application-mapper -d
#-----------------------
# -- Basic Navigation --
#-----------------------
bind = SUPER, RETURN, exec, kitty
bind = SUPER, W, killactive,
bind = SUPER, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = SUPER, E, exec, nautilus
bind = SUPER, SPACE, exec, $menu

# --- Workspace Navigation ---

# Move focus to a workspace with SUPER + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move active window to a workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# --- VIM NAVIGATION ---

# Move focus with SUPER + HJKL
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# --- ARROW KEY NAVIGATION ---

# Move focus with SUPER + Arrow Keys
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Swap windows with SUPER + SHIFT + HJKL
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Swap windows with SUPER + SHIFT + Arrow Keys
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# -- Screesnshot --
bind = SUPER SHIFT, S, exec, hyprshot -m region
bind = SUPER, S, exec, hyprshot -m window

# -----------------
# --- LookNFeel ---
#------------------
general {
    gaps_in = 2
    gaps_out = 3
    border_size = 0
}

decoration {
    rounding = 0
    dim_inactive = true
    dim_strength = 0.40

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
    }
}

animations {
    enabled = true

    # 1. A premium, ultra-smooth curve that starts fast and finishes gracefully
    bezier = fluentCurve, 0.16, 1, 0.3, 1

    # 2. Reconfigured transitions with a natural feel
    # Syntax: animation = name, enable_flag, speed_multiplier, curve, style
    animation = windows, 1, 5, fluentCurve, popin 85%
    animation = windowsOut, 1, 5, fluentCurve, popin 85%
    
    # Smooth, clean fade transitions for opening/closing and switching windows
    animation = fadeIn, 1, 4, fluentCurve
    animation = fadeOut, 1, 4, fluentCurve
    animation = fadeSwitch, 1, 5, fluentCurve

    # Slower, elegant workspace sliding speed
    animation = workspaces, 1, 6, fluentCurve, slide
}


# -----------------
# --- Inputs ---
#------------------
cursor {
    # Force a software cursor fallback layer
    no_hardware_cursors = true

    # Keep the pointer awake and drawn on screen infinitely when static
    inactive_timeout = 0
}
